name: Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
permissions: { contents: write }
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-go@v5
        with: { go-version: "1.26.4", cache: true, cache-dependency-path: pose-mcp/go.sum }
      - name: Tests + installer E2E
        run: |
          go -C pose-mcp test ./... -count=1
          bash tests/install/run.sh
      - name: Release notes from changelog fragments
        run: |
          bash .pose/scripts/pose-release-notes.sh --version "${GITHUB_REF_NAME}" --filter pose > /tmp/notes.md
          cat /tmp/notes.md
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean --release-notes /tmp/notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
