name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions: { contents: read }
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.26.4", cache: true, cache-dependency-path: pose-mcp/go.sum }
      - name: Go tests (engine drift guard included)
        run: go -C pose-mcp test ./... -count=1
      - name: Shellcheck
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck install.sh tests/install/run.sh
      - name: Installer E2E
        run: bash tests/install/run.sh
