# Independent release verification (spec pose-reproducible-release-verification):
# a consumer-side job with no producer state — no shared caches, no elevated
# credentials — downloads the published release, authenticates signature,
# provenance, checksum and SBOM, executes only after verification and
# attempts a controlled rebuild. Runs automatically when a release is
# published and on demand for any tag.
name: Verify release
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to verify (vX.Y.Z)"
        required: true
permissions: { contents: read }
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: false # verifier must not reuse producer caches
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Independent verification
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash tests/release/independent-verify.sh "${{ github.event.release.tag_name || inputs.tag }}"
      - name: Retain verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pose-verification-report
          path: verification-report.md
          retention-days: 400
